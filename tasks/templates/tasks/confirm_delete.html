{% extends 'base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="task-container">
  <h1>Delete Task</h1>

  <div style="background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 20px; margin-bottom: 30px;">
    <p style="color: #856404; font-size: 16px;">
      Are you sure you want to delete "<strong>{{ object.title }}</strong>"?
    </p>
    <p style="color: #856404; font-size: 14px; margin-top: 10px;">
      This action cannot be undone.
    </p>
  </div>

  <form method="post" style="margin-bottom: 20px;">
    {% csrf_token %}
    <div style="display: flex; gap: 10px;">
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'web-task-list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
